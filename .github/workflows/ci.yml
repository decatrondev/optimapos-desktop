name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install native build tools (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Type check
        run: npx tsc --noEmit && npx tsc -p tsconfig.electron.json --noEmit

      - name: Build app
        run: npm run build

      - name: Package (dry run, no publish)
        run: npx electron-builder --${{ matrix.platform }} --dir
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
